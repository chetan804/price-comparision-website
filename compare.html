<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Compare Products – PriceHunt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav id="navbar">
  <div class="nav-inner">
    <a class="logo" href="../index.html">🔍 <span>PriceHunt</span></a>
    <div class="nav-links">
      <a class="nav-link" href="../index.html">Home</a>
      <a class="nav-link active" href="compare.html">Compare</a>
      <a class="nav-link" href="wishlist.html">Wishlist <span class="nav-badge" id="wl-count">0</span></a>
      <a class="nav-link" href="alerts.html">Alerts <span class="nav-badge alert-badge" id="alert-count">0</span></a>
      <a class="nav-link" href="auth.html">Sign In</a>
    </div>
    <button class="hamburger" id="hamburger"><i class="ti ti-menu-2"></i></button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="../index.html">Home</a>
    <a href="compare.html">Compare</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="alerts.html">Alerts</a>
    <a href="auth.html">Sign In</a>
  </div>
</nav>

<div class="page-header">
  <h2>Product Comparison</h2>
  <p>Side-by-side specs, prices and ratings for up to 4 products.</p>
</div>

<div class="compare-actions">
  <div id="compareCount" style="font-size:0.85rem;color:var(--text2)"></div>
  <div style="display:flex;gap:0.6rem">
    <a href="../index.html" class="btn btn-ghost"><i class="ti ti-plus"></i> Add Products</a>
    <button class="btn btn-danger" id="clearBtn"><i class="ti ti-trash"></i> Clear All</button>
  </div>
</div>

<div class="compare-wrap" id="compareWrap"></div>

<div class="toast" id="toast" role="status"><i class="ti ti-check toast-icon" id="toastIcon"></i><span id="toastMsg"></span></div>

<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/store.js"></script>
<script src="../js/ui.js"></script>
<script>
(async () => {
  Store.syncBadges();
  document.getElementById("hamburger").addEventListener("click",()=>
    document.getElementById("mobileMenu").classList.toggle("open"));

  const wrap   = document.getElementById("compareWrap");
  const countEl= document.getElementById("compareCount");
  const clearBtn= document.getElementById("clearBtn");

  const { products: allProducts } = await API.getAllProducts();

  function render() {
    const ids = Store.compare.ids();
    countEl.textContent = `${ids.length} of ${CONFIG.MAX_COMPARE} products selected`;

    if (!ids.length) {
      wrap.innerHTML = `<div class="compare-empty">
        <div class="empty-icon">📊</div>
        <p style="font-size:1rem;margin-bottom:1rem">No products added yet.</p>
        <a href="../index.html" class="btn btn-primary">Browse Products</a>
      </div>`;
      return;
    }

    const prods = ids.map(id => allProducts.find(p => p.id == id)).filter(Boolean);
    const specKeys = [...new Set(prods.flatMap(p => Object.keys(p.specs || {})))];

    const headers = prods.map(p => `
      <th style="min-width:180px">
        <div style="font-size:2rem;margin-bottom:6px">${p.emoji}</div>
        <div style="font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text)">${p.name}</div>
        <div style="font-size:0.75rem;color:var(--text3);margin-top:2px">${p.cat}</div>
      </th>`).join("");

    const bestPriceRow = `<tr><td>Best Price</td>${prods.map(p => {
      const bp = Math.min(...p.prices.map(x => x.price));
      return `<td class="cell-best">${UI.fmt(bp)}</td>`;
    }).join("")}</tr>`;

    const ratingRow = `<tr><td>Rating</td>${prods.map(p =>
      `<td>${p.rating} ⭐ (${UI.fmtReviews(p.reviews)})</td>`).join("")}</tr>`;

    const discountRow = `<tr><td>Discount</td>${prods.map(p =>
      `<td><span class="cell-badge" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2)">${p.discount}% OFF</span></td>`).join("")}</tr>`;

    const storeRows = prods[0].prices.map((_, i) => `
      <tr><td>Store ${i+1}</td>${prods.map(p => {
        const pr = p.prices[i];
        if (!pr) return "<td>—</td>";
        const best = Math.min(...p.prices.map(x => x.price));
        return `<td><a href="${pr.url}" target="_blank" rel="noopener" style="color:${pr.price===best?"var(--green)":"var(--text)"}">${pr.store}: ${UI.fmt(pr.price)}</a></td>`;
      }).join("")}</tr>`).join("");

    const specRows = specKeys.map(k => `
      <tr><td>${k}</td>${prods.map(p => `<td>${(p.specs||{})[k] || "—"}</td>`).join("")}</tr>`).join("");

    const buyRow = `<tr><td></td>${prods.map(p => {
      const best = p.prices.reduce((a,b) => a.price<b.price?a:b);
      return `<td><a href="${best.url}" target="_blank" rel="noopener" class="btn btn-primary" style="padding:0.5rem 1rem;font-size:0.8rem">Buy at ${best.store} →</a></td>`;
    }).join("")}</tr>`;

    wrap.innerHTML = `
      <table class="compare-table">
        <thead><tr><th>Feature</th>${headers}</tr></thead>
        <tbody>
          ${bestPriceRow}${ratingRow}${discountRow}${storeRows}${specRows}${buyRow}
        </tbody>
      </table>`;
  }

  clearBtn.addEventListener("click", () => {
    Store.compare.clear();
    render();
    UI.toast("Compare list cleared", "error");
  });

  render();
})();
</script>
</body>
</html>
